        <filter id="marker-texture" filterUnits="objectBoundingBox" x="-10%" y="-10%" width="120%" height="120%">
            <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="3" result="noise" />
            
            <feTurbulence type="turbulence" baseFrequency="0.04" numOctaves="2" result="edgeNoise" />
            <feDisplacementMap in="SourceGraphic" in2="edgeNoise" scale="6" xChannelSelector="R" yChannelSelector="G" result="warped" />

            <feComposite in="warped" in2="noise" operator="arithmetic" k1="0.4" k2="0.7" k3="0" k4="0" />
        </filter>
    </svg>
